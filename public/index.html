<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>K2 Collection</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080a0f;--bg2:#0d1117;--bg3:#161b22;--bg4:#1c2333;
  --border:#2a3040;--text:#e6edf3;--text2:#8b949e;--text3:#484f58;
  --orange:#ff5722;--orange2:#e64a19;--green:#00c853;--green2:#00a844;
  --red:#ff1744;--blue:#2979ff;--purple:#aa00ff;--gold:#ffab00;--teal:#1de9b6;
  --tab-h:64px;--max-w:480px;
}
html,body{height:100%;font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;overflow-x:hidden}
#root{min-height:100vh;display:flex;flex-direction:column}
button{cursor:pointer;font-family:inherit;border:none;outline:none}
input,select{font-family:inherit}
a{color:var(--teal);text-decoration:none}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ── TOP BAR ── */
.topbar{position:fixed;top:0;left:0;right:0;z-index:100;height:56px;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(180deg,rgba(8,10,15,0.95) 0%,rgba(8,10,15,0.85) 100%);backdrop-filter:blur(16px)}
.topbar-inner{width:100%;max-width:var(--max-w);padding:0 20px;display:flex;align-items:center;justify-content:space-between}
.topbar-brand{display:flex;align-items:center;gap:8px;font-weight:700;font-size:16px}
.topbar-brand img{width:28px;height:28px;border-radius:6px;background:transparent;object-fit:contain}
.balance-pill{display:flex;align-items:center;gap:0;background:linear-gradient(135deg,#1a3a2a,#0d2818);border:1px solid rgba(0,200,83,0.3);border-radius:20px;padding:0;overflow:hidden}
.balance-pill .amt{padding:8px 12px;font-weight:700;font-size:14px;color:var(--green);font-family:'JetBrains Mono',monospace}
.balance-pill .plus{width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:var(--green);color:#000;font-size:20px;font-weight:700;border-radius:0 18px 18px 0;cursor:pointer}

/* ── BOTTOM TABS ── */
.tabs{position:fixed;bottom:0;left:0;right:0;z-index:100;height:var(--tab-h);
  background:rgba(13,17,23,0.96);backdrop-filter:blur(16px);border-top:1px solid var(--border);display:flex;justify-content:center}
.tabs-inner{width:100%;max-width:var(--max-w);display:flex}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  color:var(--text3);font-size:10px;font-weight:600;transition:color 0.2s;cursor:pointer;background:none;letter-spacing:0.03em}
.tab svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8}
.tab.active{color:var(--orange)}
.tab.active svg{stroke:var(--orange)}

/* ── PAGE LAYOUT ── */
.page{flex:1;padding-top:56px;padding-bottom:var(--tab-h);max-width:var(--max-w);width:100%;margin:0 auto}
.page-scroll{padding:0 20px 24px}
.section-title{font-size:22px;font-weight:800;margin:20px 0 16px}

/* ── BUTTONS ── */
.btn-orange{width:100%;padding:16px;border-radius:14px;background:var(--orange);color:#fff;font-weight:700;font-size:16px;
  transition:all 0.2s;text-transform:none;letter-spacing:0}
.btn-orange:hover{background:var(--orange2);transform:translateY(-1px)}
.btn-orange:disabled{opacity:0.4;cursor:not-allowed;transform:none}
.btn-outline{padding:10px 20px;border-radius:10px;background:transparent;color:var(--text2);border:1px solid var(--border);font-weight:600;font-size:13px;transition:all 0.2s}
.btn-outline:hover{border-color:var(--text2);color:var(--text)}
.btn-sm{padding:10px 16px;border-radius:10px;font-weight:600;font-size:13px}
.btn-green{background:var(--green);color:#000}.btn-red{background:var(--red);color:#fff}
.btn-ghost{background:rgba(255,255,255,0.06);color:var(--text2);border:1px solid var(--border)}

/* ── INPUTS ── */
.input{width:100%;padding:14px 16px;border-radius:12px;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-size:14px;outline:none;transition:border-color 0.2s}
.input:focus{border-color:var(--orange)}
.input::placeholder{color:var(--text3)}
.label{display:block;font-size:11px;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.08em;font-weight:600}
.field{margin-bottom:14px}
select.input{appearance:none;cursor:pointer}

/* ── PACK SWIPER ── */
.pack-swiper{position:relative;width:100%;overflow:hidden;padding:20px 0 0}
.pack-track{display:flex;transition:transform 0.4s cubic-bezier(0.25,0.46,0.45,0.94);touch-action:pan-y}
.pack-slide{min-width:100%;display:flex;flex-direction:column;align-items:center;padding:0 20px}
.pack-visual{width:220px;height:310px;border-radius:16px;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;margin-bottom:20px;
  box-shadow:0 20px 60px rgba(0,0,0,0.5)}
.pack-visual .pack-bg{position:absolute;inset:0;opacity:0.9}
.pack-sv151 .pack-bg{background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460)}
.pack-starter .pack-bg{background:linear-gradient(135deg,#1a1a1a,#2d2d2d,#1a1a1a);border:2px solid #444}
.pack-basic .pack-bg{background:linear-gradient(135deg,#1a2a1a,#2d4a2d,#1a3a1a)}
.pack-signature .pack-bg{background:linear-gradient(135deg,#2a1a0a,#4a2a0a,#3a1a00)}
.pack-logo-area{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:12px}
.pack-logo-area img{width:60px;height:60px;border-radius:12px;background:transparent;object-fit:contain}
.pack-logo-area .pack-label{color:rgba(255,255,255,0.5);font-size:11px;text-transform:uppercase;letter-spacing:0.15em;font-weight:700}
.pack-logo-area .pack-icon{width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,0.1);border:2px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center}
.pack-name{font-size:20px;font-weight:800;text-align:center;margin-bottom:4px}
.pack-inside-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 20px;border-radius:20px;background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.15);color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;margin-bottom:20px}
.pack-inside-btn:hover{background:rgba(255,255,255,0.12);color:var(--text)}
.pack-meta{display:flex;align-items:flex-end;justify-content:space-between;width:100%;padding:0 4px;margin-bottom:16px}
.pack-meta-item{text-align:center}
.pack-meta-item .meta-label{font-size:11px;color:var(--text3);margin-bottom:2px}
.pack-meta-item .meta-value{font-size:20px;font-weight:800}
.pack-meta-item .meta-value.green{color:var(--green)}
.pack-dots{display:flex;gap:8px;justify-content:center;margin:16px 0 8px}
.pack-dot{width:8px;height:8px;border-radius:4px;background:var(--border);transition:all 0.2s;cursor:pointer}
.pack-dot.active{background:var(--orange);width:20px}
.pack-actions{width:100%;display:flex;gap:10px;padding:0 20px}
.pack-actions .btn-orange{flex:3}.pack-actions .btn-outline{flex:2;text-align:center}

/* ── CARD FLIP ── */
.reveal-wrap{display:flex;flex-direction:column;align-items:center;padding:24px 20px}
.flip-container{perspective:1200px;width:240px;height:336px;cursor:pointer;margin-bottom:24px}
.flip-card{width:100%;height:100%;transform-style:preserve-3d;transition:transform 0.8s cubic-bezier(0.4,0,0.2,1);position:relative}
.flip-card.flipped{transform:rotateY(180deg)}
.flip-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:14px;overflow:hidden}
.flip-back{background:var(--bg3);display:flex;align-items:center;justify-content:center;border:2px solid var(--border)}
.flip-back-inner{text-align:center;opacity:0.15}
.flip-back-inner img{width:48px;margin-bottom:8px;filter:brightness(0) invert(1)}
.flip-back-inner div{font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase}
.flip-front{transform:rotateY(180deg);background:var(--bg3);border:2px solid var(--border)}
.flip-front img{width:100%;height:100%;object-fit:contain;border-radius:12px}
.flip-front .fallback{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center}
.glow-epic{filter:drop-shadow(0 0 20px rgba(170,0,255,0.5))}
.glow-legendary{filter:drop-shadow(0 0 25px rgba(255,171,0,0.6))}
.glow-grail{filter:drop-shadow(0 0 30px rgba(255,23,68,0.7));animation:gpulse 1.5s ease-in-out infinite}
@keyframes gpulse{0%,100%{filter:drop-shadow(0 0 30px rgba(255,23,68,0.7))}50%{filter:drop-shadow(0 0 50px rgba(255,23,68,0.9))}}
.card-info{text-align:center;margin-bottom:20px;width:100%}
.rarity-badge{display:inline-block;padding:4px 14px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px}
.card-info .card-name{font-size:22px;font-weight:800}.card-info .card-set{font-size:11px;color:var(--text2);margin-top:2px}
.card-info .card-val{font-size:28px;font-weight:800;color:var(--green);margin-top:8px;font-family:'JetBrains Mono',monospace}
.action-row{display:flex;gap:10px;width:100%;max-width:340px}
.action-row button{flex:1;padding:14px 10px;border-radius:12px;font-weight:700;font-size:14px;display:flex;flex-direction:column;align-items:center;gap:3px}
.action-row button .sub{font-size:9px;font-weight:500;opacity:0.7}
.action-row .keep-btn{background:var(--green);color:#000}
.action-row .recycle-btn{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}

/* Rarity colors */
.r-Common,.r-Holo{background:rgba(136,136,153,0.2);color:#889}.r-Uncommon,.r-Rare{background:rgba(0,230,118,0.15);color:#0e6}
.r-Ex,.r-Epic{background:rgba(170,0,255,0.15);color:#a0f}.r-Legendary,.r-SAR,.r-Full.Art{background:rgba(255,171,0,0.15);color:#fa0}
.r-Grail{background:rgba(255,23,68,0.15);color:#f14}
.glow-cls(rarity){} /* dynamic in JS */

/* ── BATCH ── */
.batch-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.batch-card{aspect-ratio:5/7;border-radius:10px;overflow:hidden;cursor:pointer;transition:all 0.3s;border:1px solid var(--border);background:var(--bg3)}
.batch-card img{width:100%;height:100%;object-fit:contain}
.batch-card.unrevealed{background:linear-gradient(135deg,var(--bg3),var(--bg4));display:flex;align-items:center;justify-content:center}
.batch-card.unrevealed::after{content:'?';font-size:32px;font-weight:800;color:rgba(255,255,255,0.1)}
.batch-card.actioned{opacity:0.4}
.batch-sel{background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:14px;display:flex;gap:14px;align-items:center}
.batch-sel img{width:72px;border-radius:8px}
.batch-sel-info{flex:1}
.batch-sel-info .name{font-weight:700;font-size:14px}
.batch-sel-btns{display:flex;gap:8px;margin-top:10px}
.batch-sel-btns button{flex:1;padding:10px;border-radius:10px;font-weight:700;font-size:12px}

/* ── COLLECTION ── */
.collection-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.collection-filters{display:flex;gap:8px;align-items:center}
.collection-filters select{padding:6px 10px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-size:12px}
.collection-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.vault-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:transform 0.2s}
.vault-card:hover{transform:translateY(-2px)}
.vault-card img{width:100%;aspect-ratio:5/7;object-fit:contain;background:var(--bg2)}
.vault-card-info{padding:10px}
.vault-card-info .price{font-weight:700;color:var(--green);font-family:'JetBrains Mono',monospace;font-size:14px}
.vault-card-info .name{font-size:12px;color:var(--text2);margin-top:2px}
.vault-status{display:inline-block;font-size:9px;padding:2px 8px;border-radius:6px;font-weight:700;text-transform:uppercase;margin-top:4px}
.st-pending{background:rgba(255,214,0,0.15);color:var(--gold)}.st-shipped{background:rgba(41,121,255,0.15);color:var(--blue)}.st-delivered{background:rgba(0,230,118,0.15);color:var(--green)}
.collection-empty{text-align:center;padding:60px 20px;color:var(--text3)}
.collection-empty .icon{font-size:60px;margin-bottom:16px;opacity:0.3}
.collection-notice{background:var(--bg3);border-radius:14px;padding:16px;font-size:13px;color:var(--text2);margin-top:20px;text-align:center;line-height:1.6}
.collection-notice strong{color:var(--text)}

/* ── WHAT'S INSIDE MODAL ── */
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.6);display:flex;align-items:flex-end;justify-content:center}
.modal-sheet{width:100%;max-width:var(--max-w);max-height:85vh;background:var(--bg2);border-radius:20px 20px 0 0;overflow-y:auto;padding:0 0 40px;animation:slideUp 0.3s ease-out}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0}
.modal-head{display:flex;align-items:center;gap:12px;padding:20px 24px 16px}
.modal-head img{width:40px;height:40px;border-radius:10px;background:transparent;object-fit:contain}
.modal-head .sub{font-size:13px;color:var(--text2)}.modal-head .title{font-size:20px;font-weight:800}
.modal-body{padding:0 24px}
.guarantee{background:var(--bg3);border-radius:12px;padding:16px;margin-bottom:20px}
.guarantee .g-title{color:var(--teal);font-weight:700;font-size:14px;margin-bottom:6px}
.guarantee .g-text{font-size:12px;color:var(--text2);line-height:1.6}
.odds-bars{margin-bottom:24px}
.odds-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.odds-label{width:80px;text-align:right;font-size:12px}.odds-label .tier-name{font-weight:700;color:var(--text)}.odds-label .tier-range{font-size:10px;color:var(--text3)}
.odds-bar-wrap{flex:1;height:28px;background:var(--bg);border-radius:6px;overflow:hidden;position:relative}
.odds-bar{height:100%;border-radius:6px;display:flex;align-items:center;padding-left:10px;font-size:12px;font-weight:700;color:#fff;min-width:30px}
.bar-Common{background:linear-gradient(90deg,#666,#888)}.bar-Holo{background:linear-gradient(90deg,#666,#888)}
.bar-Uncommon,.bar-Rare{background:linear-gradient(90deg,#00c853,#69db7c)}.bar-Ex,.bar-Epic{background:linear-gradient(90deg,#7c3aed,#a78bfa)}
.bar-Legendary,.bar-SAR,.bar-Full.Art{background:linear-gradient(90deg,#e64a19,#ff8a65)}.bar-Grail{background:linear-gradient(90deg,#ffc107,#ffe082)}

/* ── LOGIN ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
  background:radial-gradient(ellipse at 50% 0%,rgba(29,233,182,0.06) 0%,transparent 60%)}
.login-card{width:100%;max-width:340px;text-align:center}
.login-card img{width:72px;height:72px;border-radius:16px;background:transparent;object-fit:contain;margin-bottom:16px}
.login-card .brand{font-size:28px;font-weight:800;margin-bottom:4px}
.login-card .sub{color:var(--text2);font-size:13px;margin-bottom:32px}
.login-error{background:rgba(255,23,68,0.1);border:1px solid rgba(255,23,68,0.3);color:var(--red);padding:10px;border-radius:10px;font-size:12px;margin-bottom:14px}

/* ── ADMIN ── */
.admin-tabs{display:flex;gap:4px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px}
.admin-tab{padding:8px 14px;border-radius:8px;font-size:11px;background:var(--bg3);color:var(--text2);border:1px solid var(--border);white-space:nowrap;cursor:pointer;font-weight:600;transition:all 0.2s}
.admin-tab.active{background:var(--orange);color:#fff;border-color:var(--orange)}
.admin-table{width:100%;border-collapse:collapse;font-size:11px}
.admin-table th{text-align:left;padding:8px 6px;border-bottom:1px solid var(--border);color:var(--text3);font-size:9px;text-transform:uppercase;white-space:nowrap}
.admin-table td{padding:6px;border-bottom:1px solid rgba(42,48,64,0.3);white-space:nowrap}
.admin-table-wrap{overflow-x:auto;margin-bottom:20px}
.preset-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.preset-btn{padding:6px 12px;border-radius:8px;font-size:10px;background:var(--bg3);color:var(--text2);border:1px solid var(--border);cursor:pointer;font-weight:600;transition:all 0.2s}
.preset-btn.active{background:var(--orange);color:#fff;border-color:var(--orange)}

/* ── TOAST ── */
.toast-wrap{position:fixed;top:64px;right:12px;z-index:300;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 18px;border-radius:12px;font-size:13px;font-weight:600;animation:tIn 0.3s ease-out;max-width:280px;box-shadow:0 4px 24px rgba(0,0,0,0.4)}
.toast-keep{background:rgba(0,200,83,0.15);color:var(--green);border:1px solid rgba(0,200,83,0.3)}
.toast-recycle{background:rgba(255,171,0,0.15);color:var(--gold);border:1px solid rgba(255,171,0,0.3)}
.toast-error{background:rgba(255,23,68,0.15);color:var(--red);border:1px solid rgba(255,23,68,0.3)}
.toast-info{background:rgba(41,121,255,0.15);color:var(--blue);border:1px solid rgba(41,121,255,0.3)}
@keyframes tIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

.spinner{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:spin 0.8s linear infinite;margin:40px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px}
</style>
</head>
<body>
<div id="root"></div>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback,createContext,useContext} = React;
const API = (p,o={})=>{const t=localStorage.getItem('token');const h={'Content-Type':'application/json'};if(t)h['Authorization']='Bearer '+t;return fetch('/api'+p,{...o,headers:h}).then(async r=>{if(r.status===401){localStorage.removeItem('token');window.location.reload()}const d=r.headers.get('content-type')?.includes('json')?await r.json():await r.text();if(!r.ok)throw new Error(d.error||'Failed');return d})};
const post=(p,b)=>API(p,{method:'POST',body:JSON.stringify(b)});
const get=p=>API(p);

let tid=0;const TC=createContext();
function TP({children}){const[ts,setTs]=useState([]);const add=useCallback((m,t='info')=>{const i=++tid;setTs(x=>[...x,{id:i,msg:m,type:t}]);setTimeout(()=>setTs(x=>x.filter(y=>y.id!==i)),3000)},[]);
return React.createElement(TC.Provider,{value:add},children,React.createElement('div',{className:'toast-wrap'},ts.map(t=>React.createElement('div',{key:t.id,className:'toast toast-'+t.type},t.msg))))}
const useToast=()=>useContext(TC);

const PACK_CONF=[
  {key:'sv151',name:'SV-151 Pack',cls:'pack-sv151'},
  {key:'starter',name:'Pokémon Starter Pack',cls:'pack-starter'},
  {key:'basic',name:'Pokémon Basic Pack',cls:'pack-basic'},
  {key:'signature',name:'Pokémon Signature Pack',cls:'pack-signature'},
];

const glowCls=r=>{if(r==='Epic'||r==='Ex')return 'glow-epic';if(r==='Legendary'||r==='SAR'||r==='Full Art')return 'glow-legendary';if(r==='Grail')return 'glow-grail';return ''};

// ── SVG Icons ──

// ── BATCH REVEAL ──
function BatchPage({pulls,onDone,onUpdateBal}){
const[rev,setRev]=useState(new Set());const[sel,setSel]=useState(null);const[acts,setActs]=useState({});const toast=useToast();
const reveal=i=>{setRev(p=>new Set([...p,i]));setSel(i)};
const revealAll=()=>{setRev(new Set(pulls.map((_,i)=>i)));const fp=pulls.findIndex((_,i)=>!acts[i]);if(fp>=0)setSel(fp)};
const act=async(i,a)=>{const p=pulls[i];try{const r=await post('/pull/'+p.pullId+'/action',{action:a});setActs(x=>({...x,[i]:a}));if(a==='keep')toast('📥 Saved!','keep');else toast('♻️ +$'+r.recycleCredit.toFixed(2),'recycle');onUpdateBal(r.balance);
const nx=pulls.findIndex((_,j)=>j>i&&!acts[j]&&rev.has(j));if(nx>=0)setSel(nx);else{const any=pulls.findIndex((_,j)=>!acts[j]&&j!==i);if(any<0)setTimeout(()=>onDone(),800)}}catch(e){toast(e.message,'error')}};
const allRev=rev.size===pulls.length;const allDone=Object.keys(acts).length===pulls.length;
const pending=pulls.filter((_,i)=>rev.has(i)&&!acts[i]).length;const s=sel!==null?pulls[sel]:null;
return(<div className="page"><div className="page-scroll">
  <div className="section-title">5× Pack Opening</div>
  <div className="batch-grid">{pulls.map((p,i)=>{const isR=rev.has(i);const isA=!!acts[i];
  return(<div key={i} className={'batch-card'+(isR?'':' unrevealed')+(isA?' actioned':'')+' '+glowCls(isR?p.card.rarity:'')}
    onClick={()=>isR?setSel(i):reveal(i)} style={sel===i?{outline:'2px solid var(--orange)',outlineOffset:2}:{}}>
    {isR&&<img src={p.card.imgUrl} alt={p.card.name} onError={e=>{e.target.style.display='none'}}/>}
  </div>)})}</div>
  {!allRev&&<button className="btn-orange" onClick={revealAll} style={{marginBottom:16}}>Reveal All</button>}
  {s&&!acts[sel]&&rev.has(sel)&&<div className="batch-sel">
    <img src={s.card.imgUrl} alt={s.card.name} onError={e=>{e.target.style.display='none'}}/>
    <div className="batch-sel-info"><div className={'rarity-badge r-'+s.card.rarity.replace(/\s/g,'')} style={{marginBottom:4,fontSize:10}}>{s.card.rarity}</div>
    <div className="name">{s.card.name}</div><div style={{color:'var(--green)',fontWeight:700,marginTop:4,fontFamily:'JetBrains Mono'}}>${s.card.value.toFixed(2)}</div>
    <div className="batch-sel-btns"><button className="btn-sm btn-green" onClick={()=>act(sel,'keep')}>📥 Keep</button><button className="btn-sm btn-ghost" onClick={()=>act(sel,'recycle')}>♻️ +${s.recycleValue.toFixed(2)}</button></div>
    </div></div>}
  {allRev&&pending>1&&<div style={{display:'flex',gap:8,marginTop:12}}><button className="btn-sm btn-green" style={{flex:1}} onClick={async()=>{for(let i=0;i<pulls.length;i++)if(!acts[i]&&rev.has(i))await act(i,'keep')}}>📥 Keep All ({pending})</button><button className="btn-sm btn-ghost" style={{flex:1}} onClick={async()=>{for(let i=0;i<pulls.length;i++)if(!acts[i]&&rev.has(i))await act(i,'recycle')}}>♻️ Recycle All</button></div>}
  {allDone&&<button className="btn-orange" style={{marginTop:16}} onClick={onDone}>← Back to packs</button>}
</div></div>)}

const handlePull=async(pk)=>{try{const d=await post('/pull',{packType:pk});setPullData(d);setUser(u=>({...u,balance:d.balance}));setPage('reveal')}catch(e){toast(e.message,'error')}};
const handleBatch=async(pk)=>{try{const d=await post('/pull/batch',{packType:pk});setBatchData(d.pulls);setUser(u=>({...u,balance:d.balance}));setPage('batch')}catch(e){toast(e.message,'error')}};

if(!user)return<LoginPage onLogin={u=>{setUser(u);refresh()}}/>;
return(<>
  <TopBar user={user}/>
  {page==='packs'&&packs&&<PacksPage user={user} packs={packs} onPull={handlePull} onBatch={handleBatch} onShowInside={k=>setInsideKey(k)}/>}
  {page==='reveal'&&pullData&&<RevealPage pull={pullData} onAction={r=>{setUser(u=>({...u,balance:r.balance}));refresh()}} onBack={()=>nav('packs')}/>}
  {page==='batch'&&batchData&&<BatchPage pulls={batchData} onDone={()=>{refresh();nav('packs')}} onUpdateBal={b=>setUser(u=>({...u,balance:b}))}/>}
  {page==='collection'&&<CollectionPage/>}
  {page==='account'&&<AccountPage user={user} onLogout={()=>{localStorage.removeItem('token');setUser(null);setPage('packs')}}/>}
  {page==='admin'&&user.role==='admin'&&<AdminPage/>}
  {insideKey&&packs&&<InsideModal packKey={insideKey} packs={packs} onClose={()=>setInsideKey(null)}/>}
  <BottomTabs page={page} onNav={nav} isAdmin={user.role==='admin'}/>
</>)}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(TP,null,React.createElement(App)));
</script>
</body>
</html>
