<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TCG RIPS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ========================================================================
   GLOBAL RESET & VARIABLES
   ======================================================================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #07070d;
  --bg-card: #0f0f1a;
  --bg-elevated: #14142a;
  --bg-input: #1a1a2e;
  --border: #2a2a40;
  --text: #e8e8f0;
  --text-dim: #888899;
  --text-muted: #555566;
  --accent: #6c5ce7;
  --accent-glow: #a29bfe;
  --green: #00e676;
  --green-dim: #00c853;
  --yellow: #ffd600;
  --red: #ff1744;
  --blue: #2979ff;
  --purple: #aa00ff;
  --gold: #ffab00;
  --common-color: #888899;
  --uncommon-color: #00e676;
  --rare-color: #2979ff;
  --epic-color: #aa00ff;
  --legendary-color: #ffab00;
  --grail-color: #ff1744;
  --max-w: 480px;
  --nav-h: 52px;
}

html, body { height: 100%; }
body {
  font-family: 'JetBrains Mono', monospace;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}
a { color: var(--accent-glow); text-decoration: none; }
button { cursor: pointer; font-family: inherit; border: none; outline: none; }
input, select { font-family: inherit; }

#root {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ========================================================================
   TYPOGRAPHY
   ======================================================================== */
.font-display { font-family: 'Bebas Neue', cursive; letter-spacing: 0.05em; }

/* ========================================================================
   NAVIGATION
   ======================================================================== */
.nav {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 100;
  height: var(--nav-h);
  background: rgba(7,7,13,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
}
.nav-inner {
  width: 100%; max-width: var(--max-w);
  padding: 0 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.nav-logo {
  font-family: 'Bebas Neue', cursive;
  font-size: 22px; color: var(--text);
  cursor: pointer; display: flex; align-items: center; gap: 6px;
}
.nav-logo span { color: var(--accent-glow); }
.nav-items { display: flex; align-items: center; gap: 14px; font-size: 12px; }
.nav-item {
  display: flex; align-items: center; gap: 4px;
  color: var(--text-dim); cursor: pointer; transition: color 0.2s;
  background: none; font-size: 12px;
}
.nav-item:hover { color: var(--text); }
.nav-item.active { color: var(--accent-glow); }
.nav-badge {
  background: var(--accent); color: #fff; border-radius: 8px;
  padding: 1px 6px; font-size: 10px; font-weight: 700;
}
.nav-balance { color: var(--green); font-weight: 700; font-size: 13px; }

/* ========================================================================
   LAYOUT
   ======================================================================== */
.page {
  flex: 1; padding-top: calc(var(--nav-h) + 16px);
  max-width: var(--max-w); width: 100%;
  margin: 0 auto; padding-left: 16px; padding-right: 16px;
  padding-bottom: 32px;
}

/* ========================================================================
   BUTTONS
   ======================================================================== */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 12px 20px; border-radius: 10px;
  font-weight: 700; font-size: 13px;
  transition: all 0.2s; text-transform: uppercase;
  letter-spacing: 0.04em;
}
.btn-primary {
  background: var(--green); color: #000;
}
.btn-primary:hover { background: var(--green-dim); transform: translateY(-1px); }
.btn-secondary {
  background: var(--bg-elevated); color: var(--text-dim);
  border: 1px solid var(--border);
}
.btn-secondary:hover { border-color: var(--text-dim); color: var(--text); }
.btn-accent {
  background: var(--accent); color: #fff;
}
.btn-accent:hover { background: var(--accent-glow); }
.btn-danger { background: var(--red); color: #fff; }
.btn-sm { padding: 8px 14px; font-size: 11px; }
.btn-full { width: 100%; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ========================================================================
   FORM ELEMENTS
   ======================================================================== */
.input {
  width: 100%; padding: 12px 14px; border-radius: 8px;
  background: var(--bg-input); border: 1px solid var(--border);
  color: var(--text); font-size: 14px; outline: none;
  transition: border-color 0.2s;
}
.input:focus { border-color: var(--accent-glow); }
.input::placeholder { color: var(--text-muted); }
.label { display: block; font-size: 11px; color: var(--text-dim); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em; }
.field { margin-bottom: 16px; }
select.input { appearance: none; cursor: pointer; }

/* ========================================================================
   CARDS & CONTAINERS
   ======================================================================== */
.card-container {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 14px; padding: 20px; margin-bottom: 14px;
}

/* ========================================================================
   LOGIN PAGE
   ======================================================================== */
.login-wrap {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.login-card {
  width: 100%; max-width: 360px;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 20px; padding: 40px 28px;
  text-align: center;
}
.login-logo {
  font-family: 'Bebas Neue', cursive;
  font-size: 42px; margin-bottom: 6px;
}
.login-logo span { color: var(--accent-glow); }
.login-sub { color: var(--text-dim); font-size: 12px; margin-bottom: 32px; }
.login-error {
  background: rgba(255,23,68,0.1); border: 1px solid rgba(255,23,68,0.3);
  color: var(--red); padding: 10px; border-radius: 8px; font-size: 12px;
  margin-bottom: 16px;
}

/* ========================================================================
   HOME PAGE — PACK GRID
   ======================================================================== */
.section-title {
  font-family: 'Bebas Neue', cursive;
  font-size: 28px; margin-bottom: 16px;
  color: var(--text);
}
.pack-grid { display: flex; flex-direction: column; gap: 12px; }
.pack-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 14px; padding: 18px; cursor: pointer;
  transition: all 0.25s; position: relative; overflow: hidden;
}
.pack-card:hover { border-color: var(--accent); transform: translateY(-2px); }
.pack-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
}
.pack-sv151::before { background: linear-gradient(90deg, #ff6b6b, #ffd93d); }
.pack-starter::before { background: linear-gradient(90deg, var(--green), #69db7c); }
.pack-basic::before { background: linear-gradient(90deg, var(--blue), var(--accent)); }
.pack-signature::before { background: linear-gradient(90deg, var(--gold), var(--red)); }

.pack-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.pack-name { font-family: 'Bebas Neue', cursive; font-size: 22px; }
.pack-price { font-weight: 700; font-size: 18px; color: var(--green); }
.pack-desc { font-size: 11px; color: var(--text-dim); line-height: 1.5; margin-bottom: 12px; }
.pack-ev { font-size: 10px; color: var(--text-muted); }
.pack-ev span { color: var(--yellow); font-weight: 700; }

.pack-actions { display: flex; gap: 8px; margin-top: 12px; }
.pack-actions .btn { flex: 1; }

/* ========================================================================
   REVEAL PAGE — CARD FLIP
   ======================================================================== */
.reveal-area { display: flex; flex-direction: column; align-items: center; padding-top: 20px; }

.card-flip-container {
  perspective: 1200px; width: 240px; height: 336px;
  cursor: pointer; margin-bottom: 24px;
}
.card-flip {
  width: 100%; height: 100%;
  transform-style: preserve-3d;
  transition: transform 0.8s cubic-bezier(0.4, 0.0, 0.2, 1);
  position: relative;
}
.card-flip.flipped { transform: rotateY(180deg); }
.card-face {
  position: absolute; width: 100%; height: 100%;
  backface-visibility: hidden; border-radius: 14px;
  overflow: hidden;
}
.card-back {
  background: linear-gradient(135deg, var(--bg-elevated), var(--accent));
  display: flex; align-items: center; justify-content: center;
  border: 2px solid var(--border);
}
.card-back-pattern {
  font-family: 'Bebas Neue', cursive; font-size: 48px;
  color: rgba(255,255,255,0.12); text-align: center;
  line-height: 1.2;
}
.card-front {
  transform: rotateY(180deg);
  background: var(--bg-card); border: 2px solid var(--border);
  display: flex; flex-direction: column;
}
.card-front img {
  width: 100%; height: 100%; object-fit: contain;
  border-radius: 12px;
}
.card-front .card-fallback {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 20px; text-align: center;
}
.card-fallback .name { font-family: 'Bebas Neue', cursive; font-size: 20px; margin-bottom: 8px; }
.card-fallback .set { font-size: 11px; color: var(--text-dim); }

/* Glow effects */
.card-flip-container.glow-epic { filter: drop-shadow(0 0 20px rgba(170,0,255,0.5)); }
.card-flip-container.glow-legendary { filter: drop-shadow(0 0 25px rgba(255,171,0,0.6)); }
.card-flip-container.glow-grail {
  filter: drop-shadow(0 0 30px rgba(255,23,68,0.7));
  animation: grailPulse 1.5s ease-in-out infinite;
}
@keyframes grailPulse {
  0%, 100% { filter: drop-shadow(0 0 30px rgba(255,23,68,0.7)); }
  50% { filter: drop-shadow(0 0 50px rgba(255,23,68,0.9)); }
}

.card-info {
  text-align: center; margin-bottom: 20px; width: 100%;
}
.card-info .rarity-badge {
  display: inline-block; padding: 4px 14px; border-radius: 20px;
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.08em; margin-bottom: 8px;
}
.rarity-Common { background: rgba(136,136,153,0.2); color: var(--common-color); }
.rarity-Uncommon { background: rgba(0,230,118,0.15); color: var(--uncommon-color); }
.rarity-Rare { background: rgba(41,121,255,0.15); color: var(--rare-color); }
.rarity-Epic { background: rgba(170,0,255,0.15); color: var(--epic-color); }
.rarity-Legendary { background: rgba(255,171,0,0.15); color: var(--legendary-color); }
.rarity-Grail { background: rgba(255,23,68,0.15); color: var(--grail-color); }

.card-info .card-name { font-family: 'Bebas Neue', cursive; font-size: 22px; }
.card-info .card-set-info { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.card-info .card-value { font-size: 24px; font-weight: 700; color: var(--green); margin-top: 8px; }

.action-buttons { display: flex; gap: 10px; width: 100%; max-width: 340px; }
.action-buttons .btn { flex: 1; padding: 14px 10px; flex-direction: column; gap: 4px; }
.action-buttons .btn .sub { font-size: 9px; font-weight: 400; opacity: 0.7; }

/* ========================================================================
   BATCH REVEAL
   ======================================================================== */
.batch-cards {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
  margin-bottom: 20px;
}
.batch-cards.five { grid-template-columns: repeat(3, 1fr); }
.batch-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 10px; overflow: hidden;
  cursor: pointer; transition: all 0.3s;
  aspect-ratio: 5/7;
}
.batch-card:nth-child(4), .batch-card:nth-child(5) {
  /* Center bottom row of 2 */
}
.batch-card img { width: 100%; height: 100%; object-fit: contain; }
.batch-card.unrevealed {
  background: linear-gradient(135deg, var(--bg-elevated), var(--accent));
  display: flex; align-items: center; justify-content: center;
}
.batch-card.unrevealed::after {
  content: '?'; font-family: 'Bebas Neue', cursive; font-size: 32px;
  color: rgba(255,255,255,0.2);
}
.batch-card.revealed { border-color: var(--accent); }
.batch-card.actioned { opacity: 0.5; }

.batch-card.glow-epic { box-shadow: 0 0 15px rgba(170,0,255,0.4); border-color: var(--epic-color); }
.batch-card.glow-legendary { box-shadow: 0 0 20px rgba(255,171,0,0.5); border-color: var(--legendary-color); }
.batch-card.glow-grail { box-shadow: 0 0 25px rgba(255,23,68,0.6); border-color: var(--grail-color); animation: grailPulse2 1.5s infinite; }
@keyframes grailPulse2 {
  0%,100% { box-shadow: 0 0 25px rgba(255,23,68,0.6); }
  50% { box-shadow: 0 0 40px rgba(255,23,68,0.8); }
}

.batch-selected-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 14px; padding: 16px; margin-bottom: 16px;
  display: flex; gap: 16px; align-items: center;
}
.batch-selected-card img { width: 80px; border-radius: 8px; }
.batch-selected-info { flex: 1; }
.batch-selected-info .card-name { font-family: 'Bebas Neue', cursive; font-size: 18px; }

.batch-actions-all {
  display: flex; gap: 8px; margin-top: 16px;
}
.batch-actions-all .btn { flex: 1; }

/* ========================================================================
   VAULT PAGE
   ======================================================================== */
.vault-item {
  display: flex; gap: 14px; padding: 14px;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 12px; margin-bottom: 10px; align-items: center;
}
.vault-item img { width: 60px; height: 84px; object-fit: contain; border-radius: 6px; }
.vault-info { flex: 1; }
.vault-info .name { font-weight: 700; font-size: 13px; margin-bottom: 2px; }
.vault-info .set { font-size: 10px; color: var(--text-dim); }
.vault-info .value { font-size: 13px; color: var(--green); font-weight: 700; margin-top: 4px; }
.vault-status {
  font-size: 10px; padding: 3px 8px; border-radius: 6px;
  text-transform: uppercase; font-weight: 700;
}
.status-pending { background: rgba(255,214,0,0.15); color: var(--yellow); }
.status-shipped { background: rgba(41,121,255,0.15); color: var(--blue); }
.status-delivered { background: rgba(0,230,118,0.15); color: var(--green); }

/* ========================================================================
   ODDS PAGE
   ======================================================================== */
.odds-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 12px; }
.odds-table th {
  text-align: left; padding: 10px 8px;
  border-bottom: 1px solid var(--border);
  color: var(--text-dim); font-size: 10px; text-transform: uppercase;
  letter-spacing: 0.06em;
}
.odds-table td {
  padding: 8px; border-bottom: 1px solid rgba(42,42,64,0.5);
}
.odds-pack-title {
  font-family: 'Bebas Neue', cursive; font-size: 20px;
  margin-bottom: 4px; margin-top: 20px;
}
.odds-pack-cost { font-size: 12px; color: var(--green); margin-bottom: 10px; }

/* ========================================================================
   ADMIN PAGE
   ======================================================================== */
.admin-tabs { display: flex; gap: 4px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 4px; }
.admin-tab {
  padding: 8px 14px; border-radius: 8px; font-size: 11px;
  background: var(--bg-elevated); color: var(--text-dim);
  border: 1px solid var(--border); white-space: nowrap;
  cursor: pointer; transition: all 0.2s;
}
.admin-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

.admin-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.admin-table th {
  text-align: left; padding: 8px 6px;
  border-bottom: 1px solid var(--border);
  color: var(--text-dim); font-size: 9px; text-transform: uppercase;
  white-space: nowrap;
}
.admin-table td {
  padding: 6px; border-bottom: 1px solid rgba(42,42,64,0.3);
  white-space: nowrap;
}
.admin-table-wrap { overflow-x: auto; margin-bottom: 20px; }

.admin-form { margin-bottom: 20px; }
.admin-form .field { margin-bottom: 12px; }

.admin-preset-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.preset-btn {
  padding: 6px 12px; border-radius: 8px; font-size: 10px;
  background: var(--bg-input); color: var(--text-dim);
  border: 1px solid var(--border); cursor: pointer; transition: all 0.2s;
}
.preset-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ========================================================================
   TOAST NOTIFICATIONS
   ======================================================================== */
.toast-container { position: fixed; top: 60px; right: 12px; z-index: 200; display: flex; flex-direction: column; gap: 8px; }
.toast {
  padding: 12px 18px; border-radius: 10px; font-size: 12px;
  font-weight: 600; animation: toastIn 0.3s ease-out;
  max-width: 300px; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
.toast-keep { background: rgba(0,230,118,0.15); color: var(--green); border: 1px solid rgba(0,230,118,0.3); }
.toast-recycle { background: rgba(255,214,0,0.15); color: var(--yellow); border: 1px solid rgba(255,214,0,0.3); }
.toast-error { background: rgba(255,23,68,0.15); color: var(--red); border: 1px solid rgba(255,23,68,0.3); }
.toast-info { background: rgba(41,121,255,0.15); color: var(--blue); border: 1px solid rgba(41,121,255,0.3); }
@keyframes toastIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* ========================================================================
   LOADING
   ======================================================================== */
.spinner {
  width: 24px; height: 24px;
  border: 3px solid var(--border); border-top-color: var(--accent-glow);
  border-radius: 50%; animation: spin 0.8s linear infinite;
  margin: 40px auto;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ========================================================================
   SCROLLBAR
   ======================================================================== */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* ========================================================================
   EMPTY STATES
   ======================================================================== */
.empty-state {
  text-align: center; padding: 40px 20px; color: var(--text-dim); font-size: 13px;
}
.empty-state .icon { font-size: 40px; margin-bottom: 12px; }
</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, createContext, useContext } = React;

// ===========================================================================
// API Helper
// ===========================================================================
const API = (path, opts = {}) => {
  const token = localStorage.getItem('token');
  const headers = { 'Content-Type': 'application/json' };
  if (token) headers['Authorization'] = `Bearer ${token}`;
  return fetch(`/api${path}`, { ...opts, headers }).then(async r => {
    if (r.status === 401) { localStorage.removeItem('token'); window.location.reload(); }
    const data = r.headers.get('content-type')?.includes('json') ? await r.json() : await r.text();
    if (!r.ok) throw new Error(data.error || 'Request failed');
    return data;
  });
};
const post = (path, body) => API(path, { method: 'POST', body: JSON.stringify(body) });
const get = (path) => API(path);

// ===========================================================================
// Toast System
// ===========================================================================
let toastId = 0;
const ToastContext = createContext();
function ToastProvider({ children }) {
  const [toasts, setToasts] = useState([]);
  const addToast = useCallback((msg, type = 'info') => {
    const id = ++toastId;
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3000);
  }, []);
  return React.createElement(ToastContext.Provider, { value: addToast },
    children,
    React.createElement('div', { className: 'toast-container' },
      toasts.map(t => React.createElement('div', { key: t.id, className: `toast toast-${t.type}` }, t.msg))
    )
  );
}
const useToast = () => useContext(ToastContext);

// ===========================================================================
// Page View Tracker
// ===========================================================================
function usePageView(page) {
  const entered = useRef(new Date().toISOString());
  useEffect(() => {
    entered.current = new Date().toISOString();
    return () => {
      const now = new Date();
      const dur = (now - new Date(entered.current)) / 1000;
      post('/page-view', { page, entered_at: entered.current, exited_at: now.toISOString(), duration_seconds: Math.round(dur) }).catch(() => {});
    };
  }, [page]);
}

// ===========================================================================
// RARITY HELPERS
// ===========================================================================
const rarityColor = r => `var(--${r.toLowerCase()}-color)`;
const glowClass = r => {
  if (r === 'Epic') return 'glow-epic';
  if (r === 'Legendary') return 'glow-legendary';
  if (r === 'Grail') return 'glow-grail';
  return '';
};

// ===========================================================================
// LOGIN PAGE
// ===========================================================================
function LoginPage({ onLogin }) {
  const [username, setUsername] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const handleSubmit = async () => {
    if (!username || !password) return;
    setLoading(true); setError('');
    try {
      const data = await post('/login', { username, password });
      localStorage.setItem('token', data.token);
      onLogin(data.user);
    } catch (e) { setError(e.message); }
    setLoading(false);
  };

  return (
    <div className="login-wrap">
      <div className="login-card">
        <div className="login-logo font-display">🎴 TCG <span>RIPS</span></div>
        <div className="login-sub">Virtual Card Pack Opening</div>
        {error && <div className="login-error">{error}</div>}
        <div className="field">
          <input className="input" placeholder="Username" value={username}
            onChange={e => setUsername(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && handleSubmit()} />
        </div>
        <div className="field">
          <input className="input" type="password" placeholder="Password" value={password}
            onChange={e => setPassword(e.target.value)}

// ===========================================================================
function BatchRevealPage({ pulls, onAllDone, onUpdateBalance }) {
  usePageView('batch');
  const [revealed, setRevealed] = useState(new Set());
  const [selected, setSelected] = useState(null);
  const [actions, setActions] = useState({});
  const toast = useToast();

  const revealCard = (i) => {
    setRevealed(prev => new Set([...prev, i]));
    setSelected(i);
  };

  const revealAll = () => {
    const all = new Set(pulls.map((_, i) => i));
    setRevealed(all);
    // Select first un-actioned
    const firstPending = pulls.findIndex((_, i) => !actions[i]);
    if (firstPending >= 0) setSelected(firstPending);
  };

  const handleAction = async (idx, action) => {
    const p = pulls[idx];
    try {
      const res = await post(`/pull/${p.pullId}/action`, { action });
      setActions(prev => ({ ...prev, [idx]: action }));
      if (action === 'keep') toast('📥 Saved to vault!', 'keep');
      else toast(`♻️ +$${res.recycleCredit.toFixed(2)}`, 'recycle');
      onUpdateBalance(res.balance);
      // Auto-select next
      const nextPending = pulls.findIndex((_, i) => i > idx && !actions[i] && revealed.has(i));
      if (nextPending >= 0) setSelected(nextPending);
      else {
        const anyPending = pulls.findIndex((_, i) => !actions[i] && i !== idx);
        if (anyPending < 0) setTimeout(() => onAllDone(), 800);
        else if (revealed.has(anyPending)) setSelected(anyPending);
      }
    } catch (e) { toast(e.message, 'error'); }
  };

  const keepAll = async () => {
    for (let i = 0; i < pulls.length; i++) {
      if (!actions[i] && revealed.has(i)) await handleAction(i, 'keep');
    }
  };

  const recycleAll = async () => {
    for (let i = 0; i < pulls.length; i++) {
      if (!actions[i] && revealed.has(i)) await handleAction(i, 'recycle');
    }
  };

  const allRevealed = revealed.size === pulls.length;
  const allActioned = Object.keys(actions).length === pulls.length;
  const pendingCount = pulls.filter((_, i) => revealed.has(i) && !actions[i]).length;
  const sel = selected !== null ? pulls[selected] : null;

  return (
    <div className="page">
      <div className="section-title font-display">5× Pack Opening</div>

      <div className="batch-cards five">
        {pulls.map((p, i) => {
          const isRevealed = revealed.has(i);
          const isActioned = !!actions[i];
          const card = p.card;
          let cls = 'batch-card';
          if (!isRevealed) cls += ' unrevealed';
          else {
            cls += ' revealed';
            if (isActioned) cls += ' actioned';
            cls += ' ' + glowClass(card.rarity);
          }
          return (
            <div key={i} className={cls} onClick={() => isRevealed ? setSelected(i) : revealCard(i)}
              style={selected === i ? { outline: '2px solid var(--accent-glow)', outlineOffset: 2 } : {}}>
              {isRevealed && (
                <img src={card.imgUrl} alt={card.name}
                  onError={e => { e.target.style.display = 'none'; }} />
              )}
            </div>
          );
        })}
      </div>

      {!allRevealed && (
        <button className="btn btn-accent btn-full btn-sm" onClick={revealAll} style={{marginBottom: 16}}>
          Reveal All
        </button>
      )}

      {sel && !actions[selected] && revealed.has(selected) && (
        <div className="batch-selected-card">
          <img src={sel.card.imgUrl} alt={sel.card.name}
            onError={e => { e.target.style.display = 'none'; }} />
          <div className="batch-selected-info">
            <div className={`rarity-badge rarity-${sel.card.rarity}`} style={{marginBottom: 4}}>{sel.card.rarity}</div>
            <div className="card-name font-display">{sel.card.name}</div>
            <div style={{fontSize: 11, color: 'var(--text-dim)'}}>{sel.card.set}</div>
            <div style={{fontSize: 16, fontWeight: 700, color: 'var(--green)', marginTop: 4}}>${sel.card.value.toFixed(2)}</div>
            <div style={{display:'flex', gap:8, marginTop:10}}>
              <button className="btn btn-primary btn-sm" onClick={() => handleAction(selected, 'keep')}>📥 Keep</button>
              <button className="btn btn-secondary btn-sm" onClick={() => handleAction(selected, 'recycle')}>
                ♻️ +${sel.recycleValue.toFixed(2)}
              </button>
            </div>
          </div>
        </div>
      )}

      {allRevealed && pendingCount > 1 && (
        <div className="batch-actions-all">
          <button className="btn btn-primary btn-sm" onClick={keepAll}>📥 Keep All ({pendingCount})</button>
          <button className="btn btn-secondary btn-sm" onClick={recycleAll}>♻️ Recycle All ({pendingCount})</button>
        </div>
      )}

      {allActioned && (
        <button className="btn btn-accent btn-full" style={{marginTop: 16}} onClick={onAllDone}>
          ← Back to packs
        </button>
      )}
    </div>
  );
}

function AdminBalance({ type, toast }) {
  const [users, setUsers] = useState([]);

  const [amount, setAmount] = useState('');
  const [reason, setReason] = useState('');
  const [refUser, setRefUser] = useState('');
  const [loading, setLoading] = useState(false);

  useEffect(() => { get('/admin/users').then(setUsers); }, []);

  const topupPresets = [
    { key: 'referral', label: 'Referral $10', amount: 10 },
    { key: 'airdrop', label: 'Airdrop $20', amount: 20 },
    { key: 'topup', label: 'Custom Topup' },
    { key: 'other_topup', label: 'Other' },
  ];
  const deductPresets = [
    { key: 'refund', label: 'Refund' },
    { key: 'withdrawal', label: 'Withdrawal' },
    { key: 'other_deduct', label: 'Other' },
  ];
  const presets = type === 'topup' ? topupPresets : deductPresets;

  const handlePreset = (p) => {
    setPreset(p.key);
    if (p.amount) setAmount(String(p.amount));
    else setAmount('');
    if (p.key === 'referral') setReason('');
    else if (p.key === 'airdrop') setReason('Event airdrop');
    else setReason('');
  };

  const submit = async () => {
    if (!userId || !amount || !preset) { toast('Fill all fields', 'error'); return; }
    setLoading(true);
    let finalReason = reason;
    let balType = type === 'topup' ? 'topup' : 'deduct';

    if (preset === 'referral') {
      balType = 'referral';
      finalReason = `Referral: invited by ${refUser}`;
    } else if (preset === 'airdrop') {
      balType = 'airdrop';
    } else if (preset === 'refund') {
      balType = 'refund';
    } else if (preset === 'withdrawal') {
      balType = 'withdrawal';
    }

    if (!finalReason && !['airdrop'].includes(preset)) {
      toast('Reason required', 'error'); setLoading(false); return;
    }

    try {
      const res = await post('/admin/balance', { userId: parseInt(userId), type: balType, amount: parseFloat(amount), reason: finalReason });
      toast(`Balance updated: $${res.balance.toFixed(2)}`, 'info');
      setAmount(''); setReason(''); setRefUser('');
    } catch (e) { toast(e.message, 'error'); }
    setLoading(false);
  };

  return (
    <div className="admin-form">
      <div className="field">
        <div className="label">Select User</div>

      </div>

      <div className="label">{type === 'topup' ? 'Add' : 'Deduct'} Preset</div>
      <div className="admin-preset-row">
        {presets.map(p => (
          <button key={p.key} className={`preset-btn ${preset === p.key ? 'active' : ''}`} onClick={() => handlePreset(p)}>
            {p.label}
          </button>
        ))}
      </div>

      {preset === 'referral' && (
        <div className="field">
          <div className="label">Invited by (username)</div>
          <input className="input" value={refUser} onChange={e => setRefUser(e.target.value)} placeholder="referrer username" />
        </div>

        </div>
      )}

      <button className="btn btn-accent btn-full" onClick={submit} disabled={loading}>
        {type === 'topup' ? '💰 Add Balance' : '💸 Deduct Balance'}
      </button>
    </div>
  );

  const [items, setItems] = useState([]);
  const load = () => get('/admin/vault').then(setItems);
  useEffect(() => { load(); }, []);

  const nextStatus = { pending: 'shipped', shipped: 'delivered', delivered: 'pending' };

  const cycleStatus = async (item) => {
    const newStatus = nextStatus[item.ship_status || 'pending'];
    try {
      await post(`/admin/shipment/${item.shipment_id}/status`, { status: newStatus });
      toast(`Status → ${newStatus}`, 'info');
      load();
    } catch (e) { toast(e.message, 'error'); }
  };

  return (
    <div>
      {items.map(item => (
        <div key={item.id} className="vault-item" style={{cursor:'pointer'}} onClick={() => cycleStatus(item)}>
          <img src={item.card_img} alt={item.card_name} onError={e => { e.target.style.display = 'none'; }} />
          <div className="vault-info">
            <div className="name">{item.card_name}</div>
            <div className="set">{item.username} · {item.card_set}</div>
            <div className="value">${item.card_value.toFixed(2)}</div>
          </div>
          <div className={`vault-status status-${item.ship_status || 'pending'}`}>
            {item.ship_status || 'pending'}
          </div>
        </div>
      ))}
      {items.length === 0 && <div className="empty-state">No vault items yet</div>}
      <div style={{fontSize:10, color:'var(--text-muted)', marginTop:12, textAlign:'center'}}>
        Tap card to cycle: pending → shipped → delivered
      </div>
    </div>
  );
}

function AdminExport() {
  const tables = ['users','balance_logs','pulls','shipments','login_logs','page_views'];
  return (
    <div>
      <div className="label" style={{marginBottom:12}}>Download CSV</div>
      {tables.map(t => (
        <a key={t} href={`/api/admin/export/${t}`} target="_blank" rel="noopener noreferrer"
          style={{display:'block', marginBottom:8}}>
          <button className="btn btn-secondary btn-sm btn-full">📥 {t}.csv</button>
        </a>
      ))}
    </div>
  );
}

// ===========================================================================
// APP ROOT
// ===========================================================================
function App() {
  const [user, setUser] = useState(null);
  const [page, setPage] = useState('home');
  const [pullData, setPullData] = useState(null);
  const [batchData, setBatchData] = useState(null);
  const [vaultCount, setVaultCount] = useState(0);
  const toast = useToast();

  // Check existing session
  useEffect(() => {
    const token = localStorage.getItem('token');
    if (token) {
      get('/me').then(u => {
        setUser(u);
        setVaultCount(u.vaultCount || 0);
      }).catch(() => localStorage.removeItem('token'));
    }
  }, []);

  const refreshUser = async () => {
    try {
      const u = await get('/me');
      setUser(u);
      setVaultCount(u.vaultCount || 0);
    } catch {}
  };

  const handleLogin = (u) => { setUser(u); refreshUser(); };
  const handleLogout = () => { localStorage.removeItem('token'); setUser(null); setPage('home'); };

  const handlePull = async (packType) => {
    try {
      const data = await post('/pull', { packType });
      setPullData(data);
      setUser(prev => ({ ...prev, balance: data.balance }));
      setPage('reveal');
    } catch (e) { toast(e.message, 'error'); }
  };

  const handleBatch = async (packType) => {
    try {
      const data = await post('/pull/batch', { packType });
      setBatchData(data.pulls);
      setUser(prev => ({ ...prev, balance: data.balance }));
      if (data.pityTriggered) toast('⚡ Pity upgrade! Last card bumped to Uncommon', 'info');
      setPage('batch');
    } catch (e) { toast(e.message, 'error'); }
  };

  const navigate = (p) => { setPage(p); setPullData(null); setBatchData(null); };

  if (!user) return <LoginPage onLogin={handleLogin} />;

  return (
    <>
      <NavBar user={user} vaultCount={vaultCount} currentPage={page} onNavigate={navigate} onLogout={handleLogout} />
      {page === 'home' && <HomePage user={user} onPull={handlePull} onBatch={handleBatch} />}
      {page === 'reveal' && pullData && (
        <RevealPage pull={pullData} onAction={(res) => {
          setUser(prev => ({ ...prev, balance: res.balance }));
          refreshUser();
        }} onBack={() => navigate('home')} />
      )}
      {page === 'batch' && batchData && (
        <BatchRevealPage pulls={batchData}
          onAllDone={() => { refreshUser(); navigate('home'); }}
          onUpdateBalance={(b) => setUser(prev => ({ ...prev, balance: b }))} />
      )}
      {page === 'vault' && <VaultPage />}
      {page === 'odds' && <OddsPage />}
      {page === 'admin' && user.role === 'admin' && <AdminPage />}
    </>
  );
}

// ===========================================================================
// RENDER
// ===========================================================================
ReactDOM.createRoot(document.getElementById('root')).render(
  React.createElement(ToastProvider, null, React.createElement(App))
);
</script>
</body>
</html>
